<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Eco Haus Meister</title>
</head>
<body class="bg-white">

    <header class="bg-amber-50 shadow-md">
        <div class="container mx-auto px-6">
            <div class="flex items-center justify-between py-4">

                <!-- Logo -->
                <a href="index.html" class="text-2xl font-bold text-[#3e2723] tracking-wide">
                    Eco Haus Meister
                </a>

                <!-- Navigation -->
                <nav class="hidden md:flex items-center gap-8 text-gray-700 font-medium">
                    <a href="services.html" data-key="services" class="hover:text-[#3e2723] transition">
                        Услуги
                    </a>

                    <a href="consruction_stages.html" data-key="stages" class="hover:text-[#3e2723] transition">
                        Этапы строительства
                    </a>

                    <a href="adventages.html" data-key="advantages" class="hover:text-[#3e2723] transition">
                        Преимущества
                    </a>

                    <a href="projects.html" data-key="projects" class="hover:text-[#3e2723] transition">
                        Проекты
                    </a>

                    <a href="contacts.html" data-key="contacts" class="hover:text-[#3e2723] transition">
                        Контакты
                    </a>
                </nav>

                <!-- Right Side -->
                <div class="flex items-center gap-4">

                    <!-- Language -->
                    <div class="relative">
                        <button onclick="toggleLang()"
                            class="flex items-center gap-2 bg-[#3e2723] text-white px-4 py-2 rounded-full hover:bg-[#5d4037] transition shadow">

                            🌐 <span id="currentLang">Язык</span>

                            <svg xmlns="http://www.w3.org/2000/svg"
                                class="w-4 h-4"
                                fill="none"
                                viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M19 9l-7 7-7-7"/>
                            </svg>

                        </button>

                        <!-- Dropdown -->
                        <div id="langMenu"
                            class="hidden absolute right-0 mt-3 w-40 bg-white border rounded-xl shadow-lg overflow-hidden">

                            <button onclick="setLang('ru')"
                                class="block w-full text-left px-4 py-2 hover:bg-gray-100">
                                Русский
                            </button>

                            <button onclick="setLang('ro')"
                                class="block w-full text-left px-4 py-2 hover:bg-gray-100">
                                Română
                            </button>

                            <button onclick="setLang('en')"
                                class="block w-full text-left px-4 py-2 hover:bg-gray-100">
                                English
                            </button>

                            <button onclick="setLang('de')"
                                class="block w-full text-left px-4 py-2 hover:bg-gray-100">
                                Deutsch
                            </button>

                        </div>
                    </div>

                </div>

            </div>
        </div>
    </header>
    <main>

    </main>
    <footer>
         <div style="background-color: #3b0000; padding-top: 0.375rem; padding-bottom: 0.375rem;">
                <div class="container mx-auto px-4">
                    <div class="flex items-center justify-center gap-8 text-sm text-white">
                        <p>&copy; 2026 Eco Haus Meister. All rights reserved.</p>
                    </div>
                </div>
            </div>
    </footer>
</body>
</html>
